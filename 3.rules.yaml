# rules.yaml
# Phase-0 routing rules

rules:

  # ===========================================================================
  # 1. Route architecture work to Powerful tier
  # ===========================================================================
  - name: "architecture_to_powerful"
    type: "route"
    match_by: "intent"
    match_value: "architecture_design"
    action:
      tier: "powerful"
    scope: "all_agents"
    priority: 100

  # ===========================================================================
  # 2. Boost security-related prompts to at least Standard
  # ===========================================================================
  - name: "security_keywords_standard"
    type: "boost"
    match_by: "keyword"
    match_value:
      - "security"
      - "vulnerability"
      - "CVE"
    action:
      min_tier: "standard"
    scope: "all_agents"
    priority: 90

  # ===========================================================================
  # 3. Doc-writer can never exceed Fast
  # ===========================================================================
  - name: "doc_writer_fast_only"
    type: "limit"
    match_by: "agent"
    match_value: "doc-writer"
    action:
      max_tier: "fast"
    scope: "agent"
    priority: 80

  # ===========================================================================
  # 4. Active incident handling
  # ===========================================================================
  - name: "payment_service_incident"
    type: "timed"
    match_by: "workspace"
    match_value: "payment-service"
    action:
      tier: "powerful"
    scope: "workspace"
    priority: 1000
    expires_at: "2026-12-31T23:59:59Z"

  # ===========================================================================
  # 5. Route image generation to DALL-E
  # ===========================================================================
  - name: "image_gen_dalle3"
    type: "redirect"
    match_by: "intent"
    match_value: "image_generation"
    action:
      provider: "openai"
      model: "dall-e-3"
    scope: "all_agents"
    priority: 70

  # ===========================================================================
  # 6. Example cost cap rule (required by schema coverage)
  # ===========================================================================
  - name: "creative_cost_cap"
    type: "cost_cap"
    match_by: "session_size"
    match_value:
      min: 50000
    action:
      max_cost_usd: 0.05
    scope: "session"
    priority: 50