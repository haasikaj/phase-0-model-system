# models.yaml
# Phase-0 model catalog.
# Used by EP1 / EP2 model selection and routing.
# Unknown keys should be rejected by validation.

# tier:
#   - fast
#   - standard
#   - powerful
#
# status:
#   - active
#   - preview
#   - deprecated

# Example:
#
# - id: "gpt-4o"
#   provider: "openai"
#   tier: "standard"
#   status: "active"
#
#   pricing:
#     input: 5.00
#     output: 15.00
#
#   specs:
#     max_output_tokens: 4096
#     supports_images: true
#     supports_tools: true
#     supports_reasoning: true
#
#   context_profile:
#     native_window: 128000
#     effective_window: 110000
#     memory_budget_tokens_tokens: 18000
#     compaction_floor: 0.20
#
#   best_for:
#     - "general chat"
#     - "tool use"

models:

